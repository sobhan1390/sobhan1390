name: 🌐 Browser Capture (JS & Cookies Enabled)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'آدرس سایت'
        required: true
        type: string
        default: 'https://example.com'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Puppeteer
        run: |
          npm init -y
          npm install puppeteer

      - name: Create capture script
        run: |
          cat > capture.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');

          (async () => {
            const url = process.env.URL;
            console.log(`Opening: ${url}`);

            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });

            // فعال بودن جاوااسکریپت و کوکی‌ها (پیش‌فرض)
            try {
              await page.goto(url, { waitUntil: 'load', timeout: 60000 });
              console.log('Page loaded. Waiting 7 seconds...');

              // جایگزین page.waitForTimeout (سازگار با همه نسخه‌ها)
              await new Promise(resolve => setTimeout(resolve, 7000));

              // ۱. اسکرین‌شات تمام صفحه
              await page.screenshot({ path: 'output/screenshot.png', fullPage: true });
              console.log('Screenshot saved.');

              // ۲. HTML نهایی (پس از اجرای JS)
              const html = await page.content();
              fs.writeFileSync('output/page.html', html);
              console.log('HTML saved.');

              // ۳. استخراج لینک‌ها از تگ <a>
              const links = await page.$$eval('a', as =>
                as.map(a => a.href).filter(href => href && href.startsWith('http'))
              );
              const uniqueLinks = [...new Set(links)];
              fs.writeFileSync('output/links.txt', uniqueLinks.join('\n'));
              console.log(`Links extracted: ${uniqueLinks.length}`);

              // ۴. استخراج لینک‌های مدیا (تصویر، ویدئو، صوت، سورس)
              const mediaUrls = await page.$$eval(
                'img, video, audio, source, [style*="background-image"]',
                els => {
                  const urls = [];
                  for (const el of els) {
                    if (el.tagName === 'IMG' || el.tagName === 'VIDEO' || el.tagName === 'AUDIO' || el.tagName === 'SOURCE') {
                      const src = el.src || el.getAttribute('src');
                      if (src) urls.push(src);
                    }
                    // استخراج background-image از استایل
                    const style = el.getAttribute('style') || '';
                    const match = style.match(/url\(["']?([^"')]+)["']?\)/);
                    if (match) urls.push(match[1]);
                  }
                  return urls.filter(u => u && u.startsWith('http'));
                }
              );
              const uniqueMedia = [...new Set(mediaUrls)];
              fs.writeFileSync('output/media_links.txt', uniqueMedia.join('\n'));
              console.log(`Media links extracted: ${uniqueMedia.length}`);

            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            } finally {
              await browser.close();
              console.log('Done.');
            }
          })();
          EOF

      - name: Create output directory
        run: |
          DOMAIN=$(echo "${{ github.event.inputs.url }}" | awk -F/ '{print $3}' | sed 's/^www\.//')
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FOLDER="pages/${DOMAIN}/${TIMESTAMP}"
          mkdir -p "$FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV
          # لینک کردن output به پوشه نهایی
          ln -sf "$(pwd)/$FOLDER" output

      - name: Run capture
        env:
          URL: ${{ github.event.inputs.url }}
        run: node capture.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f "${{ env.FOLDER }}"
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Capture ${{ github.event.inputs.url }} [skip ci]"
          git pull --rebase
          git push
